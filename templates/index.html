<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinyVet 🐾 | Champ's Best Friend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dogYellow: '#FFB800',
                        dogBlue: '#0052FF',
                        boneWhite: '#FDFCF0',
                        darkDen: '#1A1C1E'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Fredoka', sans-serif; transition: all 0.3s ease; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #FFB800; border-radius: 20px; }
        .puffy-bounce:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-boneWhite dark:bg-darkDen text-slate-800 dark:text-slate-100 h-screen overflow-hidden">

    <div class="flex max-w-7xl mx-auto h-screen p-4 gap-4">
        <aside class="hidden md:flex w-64 flex-col p-6 rounded-[2.5rem] bg-white dark:bg-slate-800 shadow-xl border-4 border-dogYellow/20">
            <div class="text-center mb-8">
                <div class="mb-4 flex justify-center">
                    <img src="{{ url_for('static', filename='logo.png') }}" 
                         alt="TinyVet Logo" 
                         class="h-28 w-28 object-contain rounded-3xl shadow-lg border-2 border-dogYellow/30 bg-white p-1">
                </div>
                <h1 class="text-2xl font-bold text-dogBlue dark:text-dogYellow tracking-tight">TinyVet</h1>
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest text-slate-500 dark:text-slate-400">Champ's Personal Guard</p>
            </div>

            <div class="space-y-4 flex-1">
                <div class="p-4 rounded-3xl bg-dogYellow/10 border-2 border-dashed border-dogYellow/30 text-center">
                    <p class="text-sm font-semibold italic text-dogBlue dark:text-dogYellow">"Wag more, bark less!" 🐾</p>
                </div>
            </div>

            <button onclick="toggleDarkMode()" class="puffy-bounce mt-auto flex flex-col items-center gap-2 p-4 rounded-3xl bg-dogYellow text-white font-bold shadow-lg hover:bg-dogBlue transition-all">
                <span id="theme-icon" class="text-2xl">☀️</span>
                <span class="text-xs uppercase tracking-wider">Puffy Click ✨</span>
            </button>
        </aside>

        <main class="flex-1 flex flex-col bg-white/60 dark:bg-slate-900/60 backdrop-blur-md rounded-[3rem] shadow-2xl border-4 border-white dark:border-slate-800 relative overflow-hidden">
            
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-white/50 dark:bg-slate-800/50">
                <div class="flex items-center gap-3">
                    <img src="{{ url_for('static', filename='logo.png') }}" class="h-12 w-12 rounded-xl border border-dogYellow/20 shadow-sm md:hidden">
                    <div class="hidden md:flex h-12 w-12 bg-dogYellow rounded-full items-center justify-center text-2xl shadow-inner">🐕</div>
                    <div>
                        <h2 class="font-bold text-lg leading-none text-slate-900 dark:text-white">Healthy Champ</h2>
                        <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Active & Ready</span>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="md:hidden text-2xl">🌓</button>
            </div>

            <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 chat-container">
                <div class="flex gap-3">
                    <div class="h-10 w-10 bg-dogBlue rounded-full flex items-center justify-center text-white flex-none">🦴</div>
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] rounded-tl-none shadow-sm border border-slate-100 dark:border-slate-700 text-sm max-w-[85%] text-slate-800 dark:text-slate-200">
                        Woof! I'm **TinyVet**. Send me a photo or ask anything about **Champ's** health. I'm all ears! 🐾
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700">
                <div id="preview-container" class="hidden mb-4 relative inline-block animate-bounce">
                    <img id="image-preview" src="#" class="h-20 w-20 object-cover rounded-2xl border-4 border-dogYellow shadow-xl">
                    <button onclick="clearImage()" class="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1 shadow-lg">✕</button>
                </div>

                <div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-900 p-2 rounded-full px-6 shadow-inner border border-slate-200 dark:border-slate-700">
                    <label class="cursor-pointer hover:scale-110 transition-transform">
                        <span class="text-2xl">📸</span>
                        <input type="file" id="image-input" class="hidden" accept="image/*" onchange="handleImage(event)">
                    </label>
                    
                    <input type="text" id="user-input" 
                        class="flex-1 bg-transparent border-none focus:ring-0 p-3 text-sm placeholder:text-slate-400 text-slate-800 dark:text-white" 
                        placeholder="Type a message for TinyVet...">

                    <button onclick="sendMessage()" class="bg-dogBlue hover:bg-dogYellow p-3 rounded-full text-white transition-all shadow-lg active:scale-90">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '☀️';
            } else {
                html.classList.add('dark');
                icon.innerText = '🌙';
            }
        }

        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('image-preview').src = URL.createObjectURL(file);
                document.getElementById('preview-container').classList.remove('hidden');
            }
        }

        function clearImage() {
            document.getElementById('image-input').value = '';
            document.getElementById('preview-container').classList.add('hidden');
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const fileInput = document.getElementById('image-input');
            const chatWindow = document.getElementById('chat-window');
            const message = input.value.trim();
            const file = fileInput.files[0];

            if (!message && !file) return;

            chatWindow.innerHTML += `
                <div class="flex flex-col items-end gap-2">
                    <div class="bg-dogYellow text-white p-5 rounded-[2.5rem] rounded-tr-none text-sm font-medium shadow-md max-w-[80%]">
                        ${message}
                        ${file ? `<img src="${URL.createObjectURL(file)}" class="mt-3 rounded-2xl border-2 border-white/20">` : ''}
                    </div>
                </div>
            `;

            const loadId = "load-" + Date.now();
            chatWindow.innerHTML += `<div id="${loadId}" class="text-[10px] font-bold text-dogBlue animate-pulse ml-12">TinyVet is sniffing Champ's records... 🐕💨</div>`;
            
            chatWindow.scrollTop = chatWindow.scrollHeight;
            input.value = '';
            clearImage();

            const formData = new FormData();
            formData.append('message', message);
            if (file) formData.append('image', file);

            try {
                const response = await fetch('/chat', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById(loadId).remove();

                chatWindow.innerHTML += `
                    <div class="flex gap-3">
                        <div class="h-10 w-10 bg-dogBlue rounded-full flex items-center justify-center text-white flex-none">🦴</div>
                        <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-5 rounded-[2rem] rounded-tl-none shadow-sm text-sm text-slate-800 dark:text-slate-200">
                            ${data.answer}
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById(loadId).remove();
                chatWindow.innerHTML += `<div class="text-red-500 text-xs italic">Oh no! Champ's connection is lost.</div>`;
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
